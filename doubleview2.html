<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double View Gallery</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        /* --- Global Navigation Header --- */
        .top-navbar {
            width: 100%;
            background-color: #ffffff;
            padding: 12px 20px;
            border-bottom: 1px solid #ffe4e1;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #ff69b4;
            background-color: #fff0f5;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #ffb6c1;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background-color: #ff69b4;
            color: #ffffff;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.2);
            transform: translateY(-1px);
        }

        /* Split Screen Main Container */
        .split-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 61px);
        }

        /* Shared Panel Styles */
        .panel {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* Left Side Customization */
        #left-panel {
            background-color: #ffffff;
            border-right: 2px solid #ffe4e1;
        }

        /* Right Side Customization */
        #right-panel {
            background-color: #fffbfb;
        }

        h2 {
            color: #ff69b4;
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid #ffb6c1;
            padding-bottom: 10px;
        }

        /* --- Expanded, High-Visibility Preview Areas --- */
        .preview-box {
            display: none;
            position: sticky;
            top: 0;
            background: inherit;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px dashed #ff69b4;
            border-radius: 16px;
            text-align: center;
            z-index: 50;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.08);
        }

        .preview-box.active {
            display: block;
        }

        .preview-box img {
            width: 100%;
            max-width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .close-preview {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.95);
            color: #ff69b4;
            border: 1px solid #ffb6c1;
            font-size: 26px;
            width: 36px;
            height: 36px;
            line-height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        .close-preview:hover {
            background-color: #ff69b4;
            color: #ffffff;
            transform: scale(1.05);
        }

        /* Responsive Thumbnail Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .image-grid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #ffe4e1;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            background-color: #fff0f5;
        }

        .image-grid img:hover {
            transform: scale(1.02);
            border-color: #ff69b4;
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.15);
        }

        /* --- Mobile & Tablet Responsive Optimization Layout --- */
        @media (max-width: 768px) {
            body, html {
                overflow: auto;
            }

            .split-container {
                flex-direction: column;
                height: auto;
            }

            .panel {
                height: auto;
                overflow-y: visible;
                padding: 15px;
            }

            #left-panel {
                border-right: none;
                border-bottom: 2px solid #ffe4e1;
            }

            h2 {
                font-size: 1.2rem;
            }

            .preview-box {
                position: relative;
                padding: 8px;
                margin-bottom: 15px;
            }

            .preview-box img {
                max-height: 55vh;
            }

            .close-preview {
                top: 15px;
                right: 15px;
                font-size: 22px;
                width: 32px;
                height: 32px;
                line-height: 28px;
            }
            
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 8px;
            }

            .image-grid img {
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <header class="top-navbar">
        <a href="index.html" class="back-btn">&#8592; Back to Home</a>
    </header>

    <div class="split-container">
        <section id="left-panel" class="panel">
            <h2>Girlview</h2>
            
            <div id="left-preview-box" class="preview-box">
                <button class="close-preview" data-target="left-preview-box">&times;</button>
                <img id="left-preview-img" src="" alt="Left view focus">
            </div>

            <div id="girlview-grid" class="image-grid"></div>
        </section>

        <section id="right-panel" class="panel">
            <h2>Favorites</h2>

            <div id="right-preview-box" class="preview-box">
                <button class="close-preview" data-target="right-preview-box">&times;</button>
                <img id="right-preview-img" src="" alt="Right view focus">
            </div>

            <div id="favorite-grid" class="image-grid"></div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const girlviewContainer = document.getElementById('girlview-grid');
            const favoriteContainer = document.getElementById('favorite-grid');

            let girlviewImages = [];
            let favoriteImages = [];

            // Safe file parser to fetch, isolate, and return data from arrays with duplicate names
            async function loadFileArray(filePath) {
                try {
                    const response = await fetch(filePath);
                    if (!response.ok) throw new Error(`Could not fetch ${filePath}`);
                    const text = await response.text();
                    
                    const cleanCode = text.trim()
                        .replace(/(const|let|var)\s+imageFilenames\s*=/, 'return ')
                        .replace(/;$/, '');
                        
                    return new Function(cleanCode)();
                } catch (err) {
                    console.error("Error loading array data from file:", err);
                    return [];
                }
            }

            // Load the new target files cleanly into separate variables
            girlviewImages = await loadFileArray('imageframes/GirlViews2.js');
            favoriteImages = await loadFileArray('imageframes/FavoriteGirls.js');

            // Setup side preview boxes
            const setupSidePreview = (imgSrc, previewBoxId, previewImgId) => {
                const box = document.getElementById(previewBoxId);
                const img = document.getElementById(previewImgId);
                
                img.src = imgSrc;
                box.classList.add('active');
                box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            };

            // Layout Grid Generator
            const renderImages = (imageArray, targetContainer, previewBoxId, previewImgId) => {
                if (!imageArray || !Array.isArray(imageArray) || imageArray.length === 0) {
                    targetContainer.innerHTML = '<p style="color: #bbb; font-style: italic;">No images found.</p>';
                    return;
                }

                imageArray.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = "Gallery Image";
                    img.loading = "lazy";
                    
                    img.addEventListener('click', () => {
                        setupSidePreview(src, previewBoxId, previewImgId);
                    });

                    img.onerror = () => {
                        img.style.display = 'none';
                    };

                    targetContainer.appendChild(img);
                });
            };

            // Close button overlay configurations
            document.querySelectorAll('.close-preview').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetBox = document.getElementById(btn.getAttribute('data-target'));
                    targetBox.classList.remove('active');
                    targetBox.querySelector('img').src = ''; 
                });
            });

            // Kick off renders
            renderImages(girlviewImages, girlviewContainer, 'left-preview-box', 'left-preview-img');
            renderImages(favoriteImages, favoriteContainer, 'right-preview-box', 'right-preview-img');
        });
    </script>
</body>
</html>
